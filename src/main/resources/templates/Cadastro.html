<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cadastro</title>
</head>
<body>
<div th:if="${mensagemErroEmail}">
    <p th:text="${mensagemErroEmail}"></p>
</div>
<div th:if="${mensagemErroUsername}">
    <p th:text="${mensagemErroUsername}"></p>
</div>
<h1>CADASTRE-SE</h1>
<form th:object="${user}" method="post" th:action="@{/salvar}">
    <input type = "hidden" th:field="*{id}">

    <label>Nome: </label>
    <input type="text" th:field="*{nome}">
    <label>Username: </label>
    <input type="text" th:field="*{username}">
    <label>Email: </label>
    <input type="email" th:field="*{email}">
    <label>Senha: </label>
    <input type="password" th:field="*{senha}">

    <br>
    <button type="submit">Criar conta</button>
    <a>Já possui conta? </a><a th:href="@{/}">Clique aqui</a>
</form>
</body>
</html>
