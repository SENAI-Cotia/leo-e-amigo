<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/index.css}">
    <title>Home - CineStar</title>
</head>
<body>
<header>
    <img src="/css/images/logo.svg" alt="">

    <div class="header">
        <input type="checkbox" id="checkboxinput">
        <label for="checkboxinput" class="toggleswitch"></label>
        <div class="login">
            <h1>Username:</h1>
            <h1></h1>
        </div>
    </div>
</header>
<main>
    <section>
        <div class="titulo">
            <h1>Suas avaliações</h1>
            <button><a th:href="@{/review}">+ Avaliar</a></button>
        </div>
        <hr>
        <div class="info" th:each="review:${reviews}">
            <div class="container">
                <div class="capa">
                    <img th:src="${review.urlCapaFilme}">
                </div>
                <div class="informacoes">
                    <h1 th:text="${review.nomeFilme}"></h1>
                    <p th:text="${review.reviewDesc}">
                    </p>
                </div>
            </div>
            <div class="bottom">
                <div class="nota">
                    <img src="/css/images/Star%204.svg" alt="Estrela rosa">
                    <h1 th:text="${review.nota}"></h1>
                </div>

                <div class="enviar">
                    <a th:href="@{/excluir/{id}(id=${review.id})}">Excluir</a>
                    <button type="submit" th:href="@{/editarReview/{id}(id=${review.id})}" >Editar</button>
                </div>
            </div>
        </div>
    </section>
</main>
<script>
    const checkbox = document.getElementById("checkboxinput");

// tema salvo
const tema = localStorage.getItem("theme") || "light";

if (tema === "dark") {
document.body.classList.add("dark");
checkbox.checked = true;
}

checkbox.addEventListener("change", () => {
const isDark = checkbox.checked;

document.body.classList.toggle("dark", isDark);
localStorage.setItem("theme", isDark ? "dark" : "light");
});
</script>
</body>
</html>
