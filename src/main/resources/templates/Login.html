<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CineStar</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/login.css}">
</head>
<body>
<div class="container">
    <div class="login-section">
        <h1>Bem vindo de volta!</h1>
        <p>Insira suas credenciais para acessar sua conta:</p>
        <form id="loginForm" th:object="${user}" method="post" th:action="@{/login}">
            <div class="input-group">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" th:field="*{email}" placeholder="Digite seu email">
            </div>
            <div class="input-group">
                <label for="password">Senha:</label>
                <input type="password" id="password" th:field="*{senha}" name="password" placeholder="Digite sua senha">
            </div>
            <button type="submit">Login</button>
            <p>Não tem uma conta? <a class="Cadastrese" th:href="@{/cadastro}" >Cadastre-se</a></p>
            <div class="tema">
                <input type="checkbox" id="checkboxInput">
                <label for="checkboxInput" class="toggleSwitch"></label>
            </div>

        </form>
    </div>
    <div class="image-section">
    </div>
</div>
<script>
    const checkbox = document.getElementById("checkboxInput");
const loginSection = document.querySelector(".login-section");

// tema salvo
const tema = localStorage.getItem("theme") || "light";

if (tema === "dark") {
  loginSection.classList.add("dark");
  checkbox.checked = true;
}

checkbox.addEventListener("change", () => {
  const isDark = checkbox.checked;

  loginSection.classList.toggle("dark", isDark);
  localStorage.setItem("theme", isDark ? "dark" : "light");
});
</script>
</body>
</html>
