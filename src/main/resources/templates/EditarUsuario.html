<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Usuário - CineStar</title>
    <link rel="stylesheet" th:href="@{/css/registro.css}">
</head>
<body>
<header>
    <a th:href="@{/Home}"><img src="/css/images/logo.svg" alt=""></a>
</header>
<main>
    <form th:action="@{/salvarEdicaoUsuario}" th:object="${user}" method="post">
        <input type="hidden" th:field="*{id}">
        <div class="input-group">
            <label>Nome:</label>
            <input type="text" th:field="*{nome}">
        </div>
        <div class="input-group">
            <label>Username:</label>
            <input type="text" th:field="*{username}">
        </div>
        <div class="input-group">
            <label>Email:</label>
            <input type="email" th:field="*{email}">
        </div>
        <div class="input-group">
            <label>Nova senha (deixe em branco para não alterar):</label>
            <input type="password" name="novaSenha">
        </div>
        <button type="submit">Salvar</button>
        <a th:href="@{/Home}">Cancelar</a>
    </form>
</main>
</body>
</html>
