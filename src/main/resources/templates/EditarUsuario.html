<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Usuário - CineStar</title>
    <link rel="stylesheet" th:href="@{/css/EditarUsuario.css}">
</head>
<body>
<header>
    <a th:href="@{/Home}"><img src="/css/images/logo.svg" alt=""></a>

    <div class="header">
        <input type="checkbox" id="checkboxinput">
        <label for="checkboxinput" class="toggleswitch"></label>
        <div class="login">
            <h1 th:text="${username}"></h1>
            <form th:action="@{/logout}" method="post">
                <button type="submit" class="Btn">
                    <div class="sign">
                        <svg viewBox="0 0 512 512"><path d="M377.9 105.9L500.7 228.7c7.2 7.2 11.3 17.1 11.3 27.3s-4.1 20.1-11.3 27.3L377.9 406.1c-6.4 6.4-15 9.9-24 9.9c-18.7 0-33.9-15.2-33.9-33.9l0-62.1-128 0c-17.7 0-32-14.3-32-32l0-64c0-17.7 14.3-32 32-32l128 0 0-62.1c0-18.7 15.2-33.9 33.9-33.9c9 0 17.6 3.6 24 9.9zM160 96L96 96c-17.7 0-32 14.3-32 32l0 256c0 17.7 14.3 32 32 32l64 0c17.7 0 32 14.3 32 32s-14.3 32-32 32l-64 0c-53 0-96-43-96-96L0 128C0 75 43 32 96 32l64 0c17.7 0 32 14.3 32 32s-14.3 32-32 32z"></path></svg>
                    </div>
                    <div class="text">Logout</div>
                </button>
            </form>
        </div>
    </div>
</header>
<main>
   <section>
       <div class="titulo">
           <h1 th:if="${isAdmin}">Usuários cadastrados</h1>
           <h1 th:unless="${isAdmin}">Editar Usuário</h1>
       </div>
       <hr>

       <div class="container">
           <form th:action="@{/salvarEdicaoUsuario}" th:object="${user}" method="post">
               <input type="hidden" th:field="*{id}">
               <div class="info">
                   <div class="input-group">
                       <label>Nome:</label>
                       <input class="bottom" type="text" th:field="*{nome}">
                   </div>
                   <div class="input-group">
                       <label>Username:</label>
                       <input class="bottom" type="text" th:field="*{username}">
                   </div>
                   <div class="input-group">
                       <label>Email:</label>
                       <input class="bottom" type="email" th:field="*{email}">
                   </div>
                   <div class="input-group">
                       <label>Nova senha:</label>
                       <input class="bottom" type="password" name="novaSenha" placeholder="Deixe em branco para não alterar">
                   </div>
               </div>
               <div class="botoes">
                   <a th:href="@{/Home}">Cancelar</a>
                   <button type="submit">Salvar</button>
               </div>
           </form>
       </div>
   </section>
</main>
<script>
const checkbox = document.getElementById("checkboxinput");

const tema = localStorage.getItem("theme") || "light";

if (tema === "dark") {
document.body.classList.add("dark");
checkbox.checked = true;
}

checkbox.addEventListener("change", () => {
const isDark = checkbox.checked;

document.body.classList.toggle("dark", isDark);
localStorage.setItem("theme", isDark ? "dark" : "light");
});
</script>
</body>
</html>
